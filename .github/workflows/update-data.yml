name: Update study data & deploy

# 毎日カレンダーから最新の勉強記録を取得し、変更があればコミットして再公開する。
on:
  schedule:
    - cron: '0 21 * * *' # 毎日 06:00 JST（21:00 UTC）。GitHubの都合で多少遅れることあり
  workflow_dispatch: # 手動実行も可能

permissions:
  contents: write # events.json のコミット用
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: カレンダーから最新データを取得
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          CALENDAR_ID: hi.haru08@icloud.com
        run: node scripts/fetchCalendar.mjs

      - name: 変更があればコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/events.json
          if git diff --staged --quiet; then
            echo "データに変更はありません"
          else
            git commit -m "chore: カレンダーの勉強記録を自動更新"
            git push
          fi

      - run: npm test
      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
